name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: https://zegarmjxdjkrjueurics.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InplZ2FybWp4ZGprcmp1ZXVyaWNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MDI5NzAsImV4cCI6MjA4OTA3ODk3MH0.hqh9Zh7s_SZPPwp-Sdi2Q5SmPbJ4AXQ4DZilQw53EgE
      VITE_SUPABASE_PROJECT_ID: zegarmjxdjkrjueurics
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Verify build output
        run: grep -Eq '(\./)?assets/' dist/index.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
