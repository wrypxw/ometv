<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ChatRandom.gg - Video Chat with Strangers</title>
    <meta name="description" content="Meet new people worldwide with random video chat" />
    <link rel="icon" href="/favicon.png" type="image/png" />

    <meta property="og:title" content="ChatRandom.gg" />
    <meta property="og:description" content="Meet new people worldwide with random video chat" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
  </head>

  <body>
    <div
      id="app-loading-fallback"
      style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(circle at 25% 25%, rgba(124,58,237,0.28), transparent 35%), linear-gradient(135deg, #0b0914, #17152a);color:#ffffff;font-family:Arial,Helvetica,sans-serif;z-index:9999;"
    >
      <div style="max-width:520px;text-align:center;">
        <div style="width:56px;height:56px;margin:0 auto 20px;border-radius:999px;background:linear-gradient(135deg, #7c3aed, #a855f7);box-shadow:0 18px 45px rgba(124,58,237,0.35);"></div>
        <h1 data-status-title style="margin:0 0 12px;font-size:28px;font-weight:700;">Carregando ChatRandom.gg...</h1>
        <p data-status-text style="margin:0;color:rgba(255,255,255,0.72);font-size:15px;line-height:1.6;">
          Se esta mensagem não desaparecer em alguns segundos, a hospedagem ainda não publicou o build correto do app.
        </p>
      </div>
    </div>
    <div id="root"></div>
    <script>
      window.setTimeout(function () {
        if (document.documentElement.dataset.appReady === "true") return;
        var title = document.querySelector("[data-status-title]");
        var text = document.querySelector("[data-status-text]");
        if (title) title.textContent = "Publicação incompleta";
        if (text) text.textContent = "Este host ainda não carregou os arquivos compilados do app. Reenvie a pasta dist ou publique a branch gh-pages.";
      }, 3200);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
